name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.12"

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint --max-warnings 0

      - name: Type-check
        run: bunx tsc -b --noEmit

      - name: Build
        run: bun run build

      - name: Dead code
        run: bun run knip

      - name: Commitlint (PR)
        if: github.event_name == 'pull_request'
        run: |
          bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  release:
    name: Release
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.12"

      - run: bun install --frozen-lockfile

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release
