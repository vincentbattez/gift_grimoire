min_version: 1.10.0

output:
  - meta
  - summary
  - failure

pre-commit:
  parallel: true
  jobs:
    - name: lint
      run: npx eslint --fix --max-warnings 0 --no-warn-ignored {staged_files}
      glob: "*.{ts,tsx}"
      stage_fixed: true

    - name: typecheck
      run: npx tsc -b --noEmit

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
