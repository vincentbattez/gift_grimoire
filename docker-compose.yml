services:
  dev:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"
    profiles:
      - dev

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HA_URL: ${VITE_HA_URL}
        VITE_HA_TOKEN: ${VITE_HA_TOKEN}
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
